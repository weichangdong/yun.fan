              <p>如何让你遇见我<br>在我最美丽的时刻           </p>
<p>为这<br>我已在佛前求了五百年<br>求佛让我们结一段尘缘<br>佛于是把我化做一棵树<br>长在你必经的路旁           </p>
<p>阳光下<br>慎重地开满了花<br>朵朵都是我前世的盼望         </p>
<p>当你走近<br>请你细听<br>那颤抖的叶<br>是我等待的热情            </p>
<p>而当你终于无视地走过<br>在你身后落了一地的<br>朋友啊<br>那不是花瓣<br>是我凋零的心            </p>
